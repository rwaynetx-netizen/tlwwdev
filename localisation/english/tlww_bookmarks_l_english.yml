l_english:
  2036_SCENARIO:0 "2036 – The Last World War"
  2036_SCENARIO_DESC:0 "the scenario sprite is showing up now this is very good for us"
  USA_2036_DESC:0 "The United States enters 2036 as the core of Atlanticism—rich, armed, and divided.\n\nThe coalition government in Washington holds together by necessity: contain China, manage a fractured Europe, and prevent collapse at home. Every path demands a choice of priorities—and every choice creates enemies."
  SOV_2036_DESC:0 "Russia has forced history back onto the map.\n\nWith Ukraine partitioned and the western frontier militarized, Moscow seeks to consolidate the Eurasian heartland and break Atlantic encirclement—by pressure, by subversion, or by war."
  CHI_2036_DESC:0 "China is the industrial superpower of the new century.\n\nBeijing’s strategic horizon is global: secure maritime lifelines, dominate key technologies, and resolve the Taiwan question. Multipolarity is not a slogan—it is a program."
  JAP_2036_DESC:0 "Japan has turned inward—and hardened.\n\nA new nationalist order is rising in Tokyo, rebuilding strength and searching for strategic autonomy in a Pacific that is rapidly re‑arming."
  SPR_2036_DESC:0 "Spain is a fault line within Atlantic Europe.\n\nPolitically volatile and strategically positioned, Madrid can anchor a southern Atlantic axis—or fracture under the pressure of the coming storm."
  TLWW_COMING_SOON:0 "Future Scenario"
